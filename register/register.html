<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Register Thyself</title>
  <link rel="stylesheet" href="styles.css">
  
   <!-- Fonts-->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;0,700;1,400;1,600;1,700&family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Metamorphous&display=swap" rel="stylesheet">

</head>
<body>
  <header>
    <div class="header-grid">
        <div class="cross">
            <img src="../images/cross.png">
        </div>
        <section class="main-title">
            <h1><a href="../index.html">The Dotheline Post</a></h1>
        </section>
        <div class="login">
            <a id="login-link" href="../login/login.html">Logeth In</a>
        </div>
        <div class="hamburger">
            <p>☰</p>
        </div>
        <div class="search-form-grid">
            <form class="search-form">
                <input type="text" placeholder="⚲ Search">
            </form>
        </div>
    </div>
  </header>
  <main>
    <section class="authentication">
      <h2>Register Thyself</h2>
      <p>Enter a new username and password.</p>
      <form class="auth-form" id="register-form">
        <input id="username" type="text" placeholder="Enter username">
        <input id="password" type="password" placeholder="Enter password">
        <button type="submit">Register</button>
        <p id="register-error"></p>
        <img class="guy" src="../images/guy.png" alt="..." >
        <a href="../login/login.html">Return to logeth in</a>
      </form>
    </section>
  </main>
  <footer>
    <div class="footer-grid">
        <div class="copyright">
            <p>© The Dotheline Post</p>
        </div>
    </div>
  </footer>
  <script src="../script/main.js" defer></script>
</body>
</html>
